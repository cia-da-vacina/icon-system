<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Cia da Vacina · Icon System</title>
    <meta
      name="description"
      content="Galeria do @cia-da-vacina/icon-system — 22 ícones stroke 24×24"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=Fraunces:opsz,wght@9..144,600&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg: #e7f0eb;
        --surface: #f7fbf8;
        --ink: #143528;
        --muted: #4a6b58;
        --brand: #0f6b4c;
        --line: #c5d9cc;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        font-family: "DM Sans", system-ui, sans-serif;
        color: var(--ink);
        background:
          radial-gradient(900px 420px at 10% -10%, #cfe3d8 0%, transparent 60%),
          radial-gradient(700px 380px at 100% 0%, #d7ebe1 0%, transparent 55%),
          var(--bg);
        min-height: 100vh;
      }
      main {
        max-width: 1100px;
        margin: 0 auto;
        padding: 48px 20px 80px;
      }
      h1 {
        font-family: "Fraunces", Georgia, serif;
        font-weight: 600;
        font-size: clamp(1.8rem, 4vw, 2.6rem);
        margin: 0 0 8px;
        color: var(--brand);
      }
      .lead {
        max-width: 52ch;
        color: var(--muted);
        line-height: 1.5;
        margin: 0 0 28px;
      }
      .meta {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        margin-bottom: 32px;
      }
      .chip {
        border: 1px solid var(--line);
        background: var(--surface);
        border-radius: 999px;
        padding: 6px 12px;
        font-size: 13px;
        color: var(--muted);
      }
      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
        gap: 12px;
      }
      .card {
        background: var(--surface);
        border: 1px solid var(--line);
        border-radius: 14px;
        padding: 18px 12px 14px;
        text-align: center;
        transition: border-color 0.15s ease, transform 0.15s ease;
      }
      .card:hover {
        border-color: var(--brand);
        transform: translateY(-1px);
      }
      .card svg {
        width: 28px;
        height: 28px;
        stroke: var(--brand);
        fill: none;
        stroke-width: 1.75;
        stroke-linecap: round;
        stroke-linejoin: round;
      }
      .name {
        margin-top: 12px;
        font-size: 12px;
        font-weight: 500;
        color: var(--ink);
        word-break: break-word;
      }
      footer {
        margin-top: 40px;
        color: var(--muted);
        font-size: 13px;
      }
      code {
        font-size: 12px;
        background: #dff0e7;
        padding: 2px 6px;
        border-radius: 6px;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Icon System</h1>
      <p class="lead">
        Pacote <code>@cia-da-vacina/icon-system</code>: ícones SVG stroke
        (viewBox 24×24), API <code>createIcon</code>, tamanhos
        <code>xs|sm|md|lg|xl</code>. Estilo alinhado ao DS da Cia da Vacina.
      </p>
      <div class="meta">
        <span class="chip">22 ícones</span>
        <span class="chip">stroke 1.75</span>
        <span class="chip">currentColor</span>
        <span class="chip">React + styled-components</span>
      </div>
      <div class="grid" id="grid"></div>
      <footer>
        Fonte:
        <a href="https://github.com/cia-da-vacina/icon-system"
          >github.com/cia-da-vacina/icon-system</a
        >
      </footer>
    </main>
    <script>
      const icons = [
        {
          name: "InboxIcon",
          paths: `<path d="M22 12h-6l-2 3h-4l-2-3H2"/><path d="M5.45 5.11 2 12v6a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2v-6l-3.45-6.89A2 2 0 0 0 16.76 4H7.24a2 2 0 0 0-1.79 1.11z"/>`,
        },
        {
          name: "MessageIcon",
          paths: `<path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>`,
        },
        {
          name: "SendIcon",
          paths: `<path d="m22 2-7 20-4-9-9-4z"/><path d="M22 2 11 13"/>`,
        },
        {
          name: "UserIcon",
          paths: `<path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/>`,
        },
        {
          name: "UsersIcon",
          paths: `<path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/>`,
        },
        {
          name: "BuildingIcon",
          paths: `<path d="M6 22V4a2 2 0 0 1 2-2h8a2 2 0 0 1 2 2v18Z"/><path d="M6 12H4a2 2 0 0 0-2 2v6a2 2 0 0 0 2 2h2"/><path d="M18 9h2a2 2 0 0 1 2 2v9a2 2 0 0 1-2 2h-2"/><path d="M10 6h4"/><path d="M10 10h4"/><path d="M10 14h4"/><path d="M10 18h4"/>`,
        },
        {
          name: "ChartIcon",
          paths: `<path d="M3 3v18h18"/><path d="M18 17V9"/><path d="M13 17V5"/><path d="M8 17v-3"/>`,
        },
        {
          name: "ClockIcon",
          paths: `<circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/>`,
        },
        {
          name: "SearchIcon",
          paths: `<circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/>`,
        },
        {
          name: "SettingsIcon",
          paths: `<path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/><circle cx="12" cy="12" r="3"/>`,
        },
        {
          name: "LogoutIcon",
          paths: `<path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" x2="9" y1="12" y2="12"/>`,
        },
        {
          name: "ChevronDownIcon",
          paths: `<path d="m6 9 6 6 6-6"/>`,
        },
        {
          name: "CheckIcon",
          paths: `<path d="M20 6 9 17l-5-5"/>`,
        },
        {
          name: "XIcon",
          paths: `<path d="M18 6 6 18"/><path d="m6 6 12 12"/>`,
        },
        {
          name: "MenuIcon",
          paths: `<path d="M4 6h16"/><path d="M4 12h16"/><path d="M4 18h16"/>`,
        },
        {
          name: "AlertIcon",
          paths: `<path d="m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3"/><path d="M12 9v4"/><path d="M12 17h.01"/>`,
        },
        {
          name: "BotIcon",
          paths: `<path d="M12 8V4H8"/><rect width="16" height="12" x="4" y="8" rx="2"/><path d="M2 14h2"/><path d="M20 14h2"/><path d="M15 13v2"/><path d="M9 13v2"/>`,
        },
        {
          name: "HandshakeIcon",
          paths: `<path d="m11 17 2 2a1 1 0 1 0 3-3"/><path d="m14 14 2.5 2.5a1 1 0 1 0 3-3l-3.88-3.88a3 3 0 0 0-4.24 0l-.88.88a1 1 0 1 1-3-3l2.81-2.81a5.79 5.79 0 0 1 7.06-.87l.47.28a2 2 0 0 0 1.42.25L21 4"/><path d="m21 3 1 11h-2"/><path d="M3 3 2 14l6.5 6.5a1 1 0 1 0 3-3"/><path d="M3 4h8"/>`,
        },
        {
          name: "FilterIcon",
          paths: `<polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"/>`,
        },
        {
          name: "PhoneIcon",
          paths: `<path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/>`,
        },
        {
          name: "RefreshIcon",
          paths: `<path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8"/><path d="M21 3v5h-5"/><path d="M21 12a9 9 0 0 1-9 9 9.75 9.75 0 0 1-6.74-2.74L3 16"/><path d="M8 16H3v5"/>`,
        },
        {
          name: "SyringeIcon",
          paths: `<path d="m18 2 4 4"/><path d="m17 7 3-3"/><path d="M19 9 8.7 19.3c-1 1-2.5 1.2-3.5.2l-.1-.1c-1-.9-.9-2.4.1-3.5L15 5"/><path d="m9 11 4 4"/><path d="m5 19-3 3"/><path d="m14 4 6 6"/>`,
        },
      ];

      const grid = document.getElementById("grid");
      for (const icon of icons) {
        const el = document.createElement("article");
        el.className = "card";
        el.innerHTML = `
          <svg viewBox="0 0 24 24" aria-hidden="true">${icon.paths}</svg>
          <div class="name">${icon.name}</div>
        `;
        grid.appendChild(el);
      }
    </script>
  </body>
</html>
